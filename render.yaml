services:
  - type: web
    name: comps-saves-likes-portal
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALLOWED_ORIGIN
        value: https://goldencrowninvestments.github.io
      - key: APILLOW_API_KEY
        sync: false
      - key: APILLOW_MAX_ITEMS
        value: "40"
      - key: VISIBLE_COMP_LIMIT
        value: "8"
      - key: SOLD_LOOKBACK_MONTHS
        value: "12"
      - key: COMPS_PROVIDER_URL
        sync: false
      - key: COMPS_PROVIDER_TOKEN
        sync: false
